<!DOCTYPE html>
<html>
<head>
  <title>Bazi Bet Signup</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <h1 class="logo">Bazi <span>Bet</span></h1>

  <div class="tabs">
    <button onclick="goLogin()">Log in</button>
    <button class="active">Sign up</button>
  </div>

  <form onsubmit="signupUser(event)">

    <p class="code">Affiliate Code: 123ABC</p>

    <label>Username</label>
    <input type="text" id="signupUser" placeholder="Enter username" required>

    <label>Choose Currency</label>
    <select id="currency">
      <option>PKR</option>
      <option>USD</option>
    </select>

    <label>Phone Number</label>
    <input type="text" id="phone" placeholder="+92 3000000000" required>

    <label>Password</label>
    <input type="password" id="signupPass" placeholder="Enter password" required>

    <div class="check">
      <input type="checkbox" required> I am 18+ and agree terms
    </div>

    <button class="login-btn">Continue</button>

  </form>

</div>

<script src="app.js"></script>

</body>
</html>
