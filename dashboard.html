<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bazi Bet</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="logo">Bazi Bet</div>
  <div class="balance">Rs <span id="topBalance">0</span></div>
</div>

<!-- SLIDER -->
<div class="banner">
  <img src="https://via.placeholder.com/350x140" alt="">
</div>

<!-- MENU -->
<div class="menu">
  <div class="menu-item">Exclusive</div>
  <div class="menu-item">Crash</div>
  <div class="menu-item">Sports</div>
  <div class="menu-item">Slots</div>
</div>

<!-- BONUS -->
<div class="bonus">
  🎁 Get Bonus upto 5000 PKR
</div>

<!-- GAMES -->
<div class="games">

  <div class="game">Aviator</div>
  <div class="game">Crash</div>
  <div class="game">Slots</div>
  <div class="game">Spin</div>

</div>

<!-- ACTION -->
<div class="actions">
  <button onclick="addMoney()">Deposit</button>
  <button onclick="withdraw()">Withdraw</button>
  <button onclick="logout()">Logout</button>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <div>Home</div>
  <div>Casino</div>
  <div>Wallet</div>
  <div>Profile</div>
</div>

<script src="app.js"></script>

</body>
</html>
