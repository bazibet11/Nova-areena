<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BaziBet</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background:#020b1a;
    color:white;
    text-align:center;
}

/* TOP BANNER */
.banner{
    width:100%;
    height:200px;
    background:url('https://i.imgur.com/8Km9tLL.jpg') center/cover no-repeat;
}

/* LOGO */
.logo{
    font-size:40px;
    margin-top:15px;
}
.logo span{
    color:gold;
}
.crown{
    font-size:30px;
}

/* BUTTONS */
.btn{
    display:block;
    width:80%;
    margin:10px auto;
    padding:12px;
    border-radius:10px;
    font-size:18px;
    border:none;
}
.login{
    background:transparent;
    border:2px solid white;
    color:white;
}
.signup{
    background:gold;
    color:black;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:15px;
    padding:15px;
}
.card{
    background:#0c1c33;
    border-radius:15px;
    overflow:hidden;
}
.card img{
    width:100%;
    height:120px;
    object-fit:cover;
}
.card p{
    padding:10px;
}

/* JACKPOT */
.jackpot{
    color:gold;
    font-size:22px;
    margin-top:10px;
}

/* FORM */
.form{
    display:none;
    padding:20px;
}
input{
    width:80%;
    padding:10px;
    margin:8px;
    border-radius:8px;
    border:none;
}
</style>
</head>

<body>

<div class="banner"></div>

<div class="logo">
    BAZI <span>BET</span><br>
    <div class="crown">👑</div>
</div>

<button class="btn login" onclick="showLogin()">Login</button>
<button class="btn signup" onclick="showSignup()">Sign Up</button>

<div class="jackpot">💰 GRAND JACKPOT: 1000$ 💰</div>

<!-- GAMES -->
<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1596838132731-3301c3fd4317">
<p>Slots</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1606167668584-78701c57f13d">
<p>Casino</p>
</div>

<div class="card">
<img src="https://i.imgur.com/Z7AzH2c.jpg">
<p>Live Casino</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1607083206968-13611e3d76db">
<p>Fortune Games</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092">
<p>Jilli Games</p>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1508098682722-e99c43a406b2">
<p>Sports</p>
</div>

</div>

<!-- LOGIN FORM -->
<div class="form" id="loginForm">
<h2>Login</h2>
<input type="text" placeholder="Username"><br>
<input type="password" placeholder="Password"><br>
<button class="btn signup">Login Now</button>
</div>

<!-- SIGNUP FORM -->
<div class="form" id="signupForm">
<h2>Sign Up</h2>
<input type="text" placeholder="Username"><br>
<input type="email" placeholder="Email"><br>
<input type="password" placeholder="Password"><br>
<button class="btn signup">Create Account</button>
</div>

<script>
function showLogin(){
    document.getElementById('loginForm').style.display='block';
    document.getElementById('signupForm').style.display='none';
}
function showSignup(){
    document.getElementById('signupForm').style.display='block';
    document.getElementById('loginForm').style.display='none';
}
</script>

</body>
</html>
