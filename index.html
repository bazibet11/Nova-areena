<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bazi Bet</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #020b1c;
  color: white;
}

/* TOP IMAGE */
.top-banner {
  width: 100%;
  height: 220px;
  background: url('https://images.unsplash.com/photo-1596838132731-3301c3fd4317') center/cover no-repeat;
}

/* TITLE */
.title {
  text-align: center;
  font-size: 26px;
  margin-top: 15px;
}

.title span {
  color: #ffcc00;
}

/* BUTTONS */
.btn {
  display: block;
  width: 80%;
  margin: 10px auto;
  padding: 14px;
  font-size: 18px;
  border-radius: 12px;
  text-align: center;
  cursor: pointer;
}

.login {
  border: 2px solid white;
  background: transparent;
  color: white;
}

.signup {
  background: linear-gradient(to right, #ffcc00, #ffaa00);
  color: black;
  border: none;
}

/* GAMES TITLE */
.games-title {
  text-align: center;
  font-size: 20px;
  margin-top: 15px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  padding: 15px;
}

/* CARD */
.card {
  background: #0b132b;
  border-radius: 15px;
  overflow: hidden;
  text-align: center;
  box-shadow: 0 0 12px rgba(255, 204, 0, 0.3);
  position: relative;
}

.card img {
  width: 100%;
  height: 95px;
  object-fit: cover;
}

.card p {
  margin: 8px 0;
}

/* BADGE */
.badge {
  position: absolute;
  top: 5px;
  left: 5px;
  background: red;
  font-size: 10px;
  padding: 3px 6px;
  border-radius: 5px;
}
</style>

</head>

<body>

<!-- TOP -->
<div class="top-banner"></div>

<!-- TITLE -->
<div class="title">bazi <span>bet</span></div>

<!-- BUTTONS -->
<button class="btn login">Login</button>
<button class="btn signup">Sign Up</button>

<!-- GAMES -->
<div class="games-title">🎮 Games</div>

<div class="grid">

  <div class="card">
    <img src="https://cdn.pixabay.com/photo/2017/08/10/07/32/slot-machine-2619077_640.jpg">
    <p>Slots</p>
  </div>

  <div class="card">
    <img src="https://cdn.pixabay.com/photo/2016/11/29/03/53/casino-1869567_640.jpg">
    <p>Casino</p>
  </div>

  <div class="card">
    <span class="badge">LIVE</span>
    <img src="https://cdn.pixabay.com/photo/2017/08/06/00/40/woman-2587954_640.jpg">
    <p>Live Casino</p>
  </div>

  <div class="card">
    <img src="https://cdn.pixabay.com/photo/2017/01/31/21/23/wheel-2027853_640.png">
    <p>Fortune Games</p>
  </div>

  <div class="card">
    <span class="badge">HOT</span>
    <img src="https://cdn.pixabay.com/photo/2017/01/20/00/30/chili-1995056_640.png">
    <p>Chili Games</p>
  </div>

  <div class="card">
    <img src="https://cdn.pixabay.com/photo/2016/11/29/09/32/trophy-1867148_640.jpg">
    <p>Tournaments</p>
  </div>

</div>

</body>
</html>
