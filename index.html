<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bazi Bet</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #020b1c;
  color: white;
}

/* TOP BANNER */
.banner img {
  width: 100%;
  height: 220px;
  object-fit: cover;
}

/* TITLE */
.title {
  text-align: center;
  font-size: 26px;
  margin-top: 10px;
}

.title span {
  color: gold;
}

/* BUTTONS */
.btn {
  display: block;
  width: 80%;
  margin: 10px auto;
  padding: 14px;
  border-radius: 12px;
  font-size: 18px;
}

.login {
  border: 2px solid white;
  background: transparent;
  color: white;
}

.signup {
  background: linear-gradient(to right, #ffcc00, #ffaa00);
  border: none;
  color: black;
}

/* GAMES */
.games {
  text-align: center;
  margin-top: 15px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  padding: 15px;
}

/* CARD */
.card {
  background: #0b132b;
  border-radius: 15px;
  overflow: hidden;
  text-align: center;
  box-shadow: 0 0 12px rgba(255,215,0,0.3);
  position: relative;
}

.card img {
  width: 100%;
  height: 95px;
  object-fit: cover;
}

.card p {
  margin: 8px 0;
}

/* BADGES */
.badge {
  position: absolute;
  top: 5px;
  left: 5px;
  background: red;
  padding: 3px 6px;
  font-size: 10px;
  border-radius: 5px;
}
</style>
</head>

<body>

<!-- TOP IMAGE (FIXED) -->
<div class="banner">
  <img src="https://images.unsplash.com/photo-1511512578047-dfb367046420">
</div>

<!-- TITLE -->
<div class="title">bazi <span>bet</span></div>

<!-- BUTTONS -->
<button class="btn login">Login</button>
<button class="btn signup">Sign Up</button>

<!-- GAMES -->
<div class="games">🎮 Games</div>

<div class="grid">

  <div class="card">
    <img src="https://images.unsplash.com/photo-1596838132731-3301c3fd4317">
    <p>Slots</p>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1601379327928-bedfaf9da2d0">
    <p>Casino</p>
  </div>

  <div class="card">
    <span class="badge">LIVE</span>
    <img src="https://images.unsplash.com/photo-1607082349566-187342175e2f">
    <p>Live Casino</p>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1611996575749-79a3a250f948">
    <p>Fortune Games</p>
  </div>

  <div class="card">
    <span class="badge">HOT</span>
    <img src="https://images.unsplash.com/photo-1604908176997-125f25cc6f3d">
    <p>Chili Games</p>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1517649763962-0c623066013b">
    <p>Tournaments</p>
  </div>

</div>

</body>
</html>
