<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bazi Bet</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#020b1c;
  color:#fff;
}

/* Banner */
.banner{
  background:url("https://images.unsplash.com/photo-1606167668584-78701c57f13d") no-repeat center/cover;
  height:220px;
}

/* Logo */
.logo{
  text-align:center;
  font-size:32px;
  margin-top:10px;
}
.logo span{
  color:gold;
}

/* Buttons */
.btn{
  width:80%;
  margin:10px auto;
  padding:14px;
  display:block;
  border-radius:30px;
  font-size:18px;
  text-align:center;
}
.login{
  border:2px solid #fff;
  background:transparent;
  color:#fff;
}
.signup{
  background:linear-gradient(to right,gold,orange);
  color:#000;
}

/* Form */
.form{
  width:85%;
  margin:auto;
}
input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:none;
  background:#0d1b2a;
  color:#fff;
}

/* Password eye */
.pass-box{
  position:relative;
}
.eye{
  position:absolute;
  right:10px;
  top:14px;
  cursor:pointer;
}

/* Games Grid */
.games{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  padding:10px;
}
.card{
  background:#07142c;
  border-radius:15px;
  text-align:center;
  padding:10px;
}
.card img{
  width:100%;
  border-radius:10px;
}
.card p{
  margin-top:5px;
}
</style>
</head>

<body>

<div class="banner"></div>

<div class="logo">bazi <span>bet</span></div>

<button class="btn login" onclick="showLogin()">Login</button>
<button class="btn signup" onclick="showSignup()">Sign Up</button>

<!-- LOGIN -->
<div id="loginBox" class="form" style="display:none;">
  <h2>Login</h2>
  <input type="text" id="loginUser" placeholder="Username">
  
  <div class="pass-box">
    <input type="password" id="loginPass" placeholder="Password">
    <span class="eye" onclick="toggle('loginPass')">👁</span>
  </div>

  <button class="btn signup" onclick="login()">Login Now</button>
</div>

<!-- SIGNUP -->
<div id="signupBox" class="form" style="display:none;">
  <h2>Sign Up</h2>
  <input type="text" id="name" placeholder="Full Name">
  <input type="text" id="username" placeholder="Username">
  <input type="text" id="phone" placeholder="Phone Number">

  <div class="pass-box">
    <input type="password" id="password" placeholder="Password">
    <span class="eye" onclick="toggle('password')">👁</span>
  </div>

  <input type="text" id="verify" placeholder="What is 1+2 ?">

  <button class="btn signup" onclick="signup()">Create Account</button>
</div>

<!-- GAMES -->
<div class="games">

  <div class="card">
    <img src="https://images.unsplash.com/photo-1596838132731-3301c3fd4317">
    <p>Slots</p>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1511512578047-dfb367046420">
    <p>Casino</p>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1603791440384-56cd371ee9a7">
    <p>Live Casino</p>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1616531770192-6eaea74c2456">
    <p>Fortune</p>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1612874742237-6526221588e3">
    <p>Jilli Games</p>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1517649763962-0c623066013b">
    <p>Sports</p>
  </div>

</div>

<script>
function showLogin(){
  document.getElementById("loginBox").style.display="block";
  document.getElementById("signupBox").style.display="none";
}
function showSignup(){
  document.getElementById("signupBox").style.display="block";
  document.getElementById("loginBox").style.display="none";
}

/* Password eye */
function toggle(id){
  let x=document.getElementById(id);
  x.type = x.type==="password" ? "text":"password";
}

/* Signup */
function signup(){
  let u=document.getElementById("username").value;
  let p=document.getElementById("password").value;
  let v=document.getElementById("verify").value;

  if(v != "3"){
    alert("Wrong verification!");
    return;
  }

  localStorage.setItem("user",u);
  localStorage.setItem("pass",p);

  alert("Account Created!");
}

/* Login */
function login(){
  let u=document.getElementById("loginUser").value;
  let p=document.getElementById("loginPass").value;

  let su=localStorage.getItem("user");
  let sp=localStorage.getItem("pass");

  if(u===su && p===sp){
    alert("Login Success ✅");
  }else{
    alert("Wrong login ❌");
  }
}
</script>

</body>
</html>
