<!DOCTYPE html>
<html>
<head>
  <title>Login / Signup</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #0d1117;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial;
      color: white;
    }

    .box {
      width: 350px;
      background: #161b22;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
    }

    h2 { margin-bottom: 15px; }

    input, select {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 6px;
      border: 1px solid #30363d;
      background: #0d1117;
      color: white;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
    }

    .primary { background: #00c853; color: white; }
    .secondary { background: #007bff; color: white; }

    .hidden { display: none; }

    .phone-box {
      display: flex;
      gap: 5px;
    }

    .phone-box select { width: 30%; }
    .phone-box input { width: 70%; }

    .checkbox {
      font-size: 12px;
      margin-top: 10px;
      display: flex;
      align-items: center;
    }

    .checkbox input { width: auto; margin-right: 5px; }
  </style>
</head>

<body>

<div class="box">

  <!-- MAIN -->
  <div id="main">
    <h2>Welcome</h2>
    <button class="primary" onclick="showLogin()">Login</button>
    <button class="secondary" onclick="showSignup()">Sign Up</button>
  </div>

  <!-- LOGIN -->
  <div id="login" class="hidden">
    <h2>Login</h2>
    <input type="email" id="loginEmail" placeholder="Email">
    <input type="password" id="loginPassword" placeholder="Password">
    <button class="primary" onclick="login()">Login</button>
    <button onclick="back()">Back</button>
  </div>

  <!-- SIGNUP -->
  <div id="signup" class="hidden">
    <h2>Sign Up</h2>

    <input type="text" placeholder="Full Name">
    <input type="text" placeholder="Username">
    <input type="email" id="email" placeholder="Email">

    <select>
      <option>PKR</option>
      <option>USD</option>
    </select>

    <div class="phone-box">
      <select id="code">
        <option value="+92">+92</option>
      </select>
      <input type="text" id="phone" placeholder="3001234567">
    </div>

    <div id="recaptcha-container"></div>

    <button class="secondary" onclick="sendOTP()">Send OTP</button>

    <input type="text" id="otp" placeholder="Enter OTP">

    <button class="primary" onclick="verifyOTP()">Verify & Signup</button>

    <div class="checkbox">
      <input type="checkbox"> I accept Terms & Conditions
    </div>

    <button onclick="back()">Back</button>
  </div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
  import { 
    getAuth, 
    signInWithEmailAndPassword, 
    RecaptchaVerifier, 
    signInWithPhoneNumber 
  } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-auth.js";

  // 🔥 APNA REAL CONFIG YAHA LAGAO
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "nova-areena.firebaseapp.com",
    projectId: "nova-areena",
    appId: "YOUR_APP_ID"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // UI SWITCH
  window.showLogin = () => {
    main.style.display = "none";
    login.style.display = "block";
  };

  window.showSignup = () => {
    main.style.display = "none";
    signup.style.display = "block";

    window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', {
      size: 'normal'
    });
  };

  window.back = () => {
    login.style.display = "none";
    signup.style.display = "none";
    main.style.display = "block";
  };

  // LOGIN
  window.login = () => {
    const email = loginEmail.value;
    const pass = loginPassword.value;

    signInWithEmailAndPassword(auth, email, pass)
      .then(() => alert("Login Success ✅"))
      .catch(e => alert(e.message));
  };

  // SIGNUP (PHONE OTP)
  let confirmationResult;

  window.sendOTP = () => {
    const num = code.value + phone.value;

    signInWithPhoneNumber(auth, num, window.recaptchaVerifier)
      .then(res => {
        confirmationResult = res;
        alert("OTP Sent ✅");
      })
      .catch(e => alert(e.message));
  };

  window.verifyOTP = () => {
    confirmationResult.confirm(otp.value)
      .then(() => alert("Signup Success ✅"))
      .catch(() => alert("Wrong OTP ❌"));
  };
</script>

</body>
</html>
