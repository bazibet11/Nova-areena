<!DOCTYPE html>
<html>
<head>
  <title>Bazi Bet Login</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <h1 class="logo">Bazi <span>Bet</span></h1>

  <div class="tabs">
    <button class="active">Log in</button>
    <button onclick="goSignup()">Sign up</button>
  </div>

  <form onsubmit="loginUser(event)">
    
    <label>Username</label>
    <input type="text" id="loginUser" placeholder="Enter username" required>

    <label>Password</label>
    <input type="password" id="loginPass" placeholder="Enter password" required>

    <button class="login-btn">Log in</button>

  </form>

</div>

<script src="app.js"></script>

</body>
</html>
