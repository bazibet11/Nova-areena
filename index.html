<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BaziBet</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0f1a;
  color: white;
}

/* 🔥 BANNER */
.banner {
  width: 100%;
  height: 220px;
  background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)),
  url('https://images.unsplash.com/photo-1605902711622-cfb43c4437b1');
  background-size: cover;
  background-position: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.logo {
  font-size: 32px;
  font-weight: bold;
}
.logo span {
  color: gold;
}

/* 🎮 TOP GAMES SCROLL */
.top-games {
  display: flex;
  overflow-x: auto;
  gap: 10px;
  padding: 10px;
}
.top-games span {
  background: #1a1a1a;
  color: gold;
  padding: 8px 14px;
  border-radius: 20px;
  font-size: 12px;
  white-space: nowrap;
}

/* 🎯 BUTTONS */
.buttons {
  text-align: center;
  margin: 20px 0;
}
.btn {
  width: 200px;
  padding: 12px;
  margin: 10px;
  border-radius: 10px;
  font-size: 16px;
  cursor: pointer;
}
.btn-login {
  border: 2px solid white;
  background: transparent;
  color: white;
}
.btn-signup {
  background: linear-gradient(45deg, orange, gold);
  color: black;
  border: none;
}

/* 💰 JACKPOT */
.jackpot {
  text-align: center;
  color: gold;
  font-size: 18px;
  margin: 10px 0;
  animation: glow 1s infinite alternate;
}
@keyframes glow {
  from { text-shadow: 0 0 5px gold; }
  to { text-shadow: 0 0 20px orange; }
}

/* 🎮 GAMES GRID */
.games {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
  padding: 15px;
}

.game-card {
  background: #111;
  border-radius: 15px;
  overflow: hidden;
  text-align: center;
  box-shadow: 0 0 10px rgba(255,215,0,0.2);
}

.game-card img {
  width: 100%;
  height: 100px;
  object-fit: cover;
}

.game-card p {
  padding: 8px;
}

/* 🔻 FOOTER */
.footer {
  text-align: center;
  padding: 20px;
  color: gray;
}
</style>
</head>

<body>

<!-- 🔥 BANNER -->
<div class="banner">
  <h1 class="logo">bazi <span>bet</span></h1>
</div>

<!-- 🎮 TOP MENU -->
<div class="top-games">
  <span>🔥 Hot</span>
  <span>🎰 Slots</span>
  <span>🎡 Fortune</span>
  <span>🌶 Chili</span>
  <span>🎲 Table</span>
  <span>🃏 Poker</span>
</div>

<!-- 🎯 BUTTONS -->
<div class="buttons">
  <button class="btn btn-login" onclick="alert('Login Page Next')">Login</button>
  <button class="btn btn-signup" onclick="alert('Signup Page Next')">Sign Up</button>
</div>

<!-- 💰 JACKPOT -->
<div class="jackpot">
  💰 GRAND JACKPOT 💰
</div>

<!-- 🎮 GAMES -->
<div class="games">

  <div class="game-card">
    <img src="https://images.unsplash.com/photo-1596838132731-3301c3fd4317">
    <p>Slots</p>
  </div>

  <div class="game-card">
    <img src="https://images.unsplash.com/photo-1511512578047-dfb367046420">
    <p>Casino</p>
  </div>

  <div class="game-card">
    <img src="https://images.unsplash.com/photo-1546519638-68e109498ffc">
    <p>Live Casino</p>
  </div>

  <div class="game-card">
    <img src="https://images.unsplash.com/photo-1586201375761-83865001e31c">
    <p>Fortune</p>
  </div>

  <div class="game-card">
    <img src="https://images.unsplash.com/photo-1606813907291-d86efa9b94db">
    <p>Chili Game</p>
  </div>

  <div class="game-card">
    <img src="https://images.unsplash.com/photo-1606166325695-4d6eec8b7c16">
    <p>Tournament</p>
  </div>

</div>

<!-- 🔻 FOOTER -->
<div class="footer">
  © 2026 BaziBet Gaming
</div>

</body>
</html>
