<!DOCTYPE html>
<html>
<head>
<title>Bazi Bet</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
}

/* 🔥 CASINO BANNER */
.banner {
  padding:20px;
  background:linear-gradient(135deg,#021,#032);
  border-bottom:2px solid #00c853;
}

.banner h1 {
  color:gold;
  margin:0;
}

.level-box {
  margin-top:10px;
  background:#121a2b;
  padding:10px;
  border-radius:10px;
}

.bar {
  height:8px;
  background:#333;
  border-radius:10px;
  margin-top:5px;
}

.bar div {
  height:100%;
  width:30%;
  background:#00c853;
  border-radius:10px;
}

/* FORM */
.container {
  padding:20px;
}

input {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
  background:#1a2235;
  color:white;
}

button {
  width:100%;
  padding:12px;
  margin-top:15px;
  background:#00c853;
  border:none;
  color:white;
  border-radius:10px;
}

.captcha {
  margin-top:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.tab {
  display:flex;
  justify-content:space-around;
  margin-top:20px;
}

.tab span {
  cursor:pointer;
}

.active {
  color:#00c853;
}
</style>
</head>

<body>

<!-- 🔥 CASINO BANNER -->
<div class="banner">
  <h1>CASINO LEVEL</h1>
  <p>Play. Win. Level Up.</p>

  <div class="level-box">
    Level 2 → 320/1000 XP
    <div class="bar"><div></div></div>
  </div>
</div>

<div class="container">

<!-- TABS -->
<div class="tab">
  <span id="loginTab" class="active" onclick="showLogin()">Log in</span>
  <span id="signupTab" onclick="showSignup()">Sign up</span>
</div>

<!-- LOGIN -->
<div id="loginBox">
  <input id="loginUser" placeholder="Username">
  <input id="loginPass" type="password" placeholder="Password">

  <div class="captcha">
    <h3 id="cap1"></h3>
    <input id="capAns1" placeholder="Answer">
  </div>

  <button onclick="login()">Log in</button>
</div>

<!-- SIGNUP -->
<div id="signupBox" style="display:none;">
  <input id="userName" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">

  <div class="captcha">
    <h3 id="cap2"></h3>
    <input id="capAns2" placeholder="Answer">
  </div>

  <button onclick="signup()">Continue</button>
</div>

</div>

<!-- 🔥 FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script>
var firebaseConfig = {
  apiKey: "AIzaSyDHpc9lN_y8c2Ta0Xfed5ayOzEjYbN5ur4",
  authDomain: "nova-areena.firebaseapp.com",
  projectId: "nova-areena",
};

firebase.initializeApp(firebaseConfig);
var auth = firebase.auth();

/* 🔥 CAPTCHA */
let cap1, cap2;

function generateCaptcha1() {
  let a = Math.floor(Math.random()*10);
  let b = Math.floor(Math.random()*10);
  cap1 = a+b;
  document.getElementById("cap1").innerText = a+" + "+b;
}

function generateCaptcha2() {
  let a = Math.floor(Math.random()*10);
  let b = Math.floor(Math.random()*10);
  cap2 = a+b;
  document.getElementById("cap2").innerText = a+" + "+b;
}

/* 🔥 SWITCH */
function showSignup(){
  document.getElementById("loginBox").style.display="none";
  document.getElementById("signupBox").style.display="block";
}

function showLogin(){
  document.getElementById("loginBox").style.display="block";
  document.getElementById("signupBox").style.display="none";
}

/* 🔥 SIGNUP */
function signup(){
  let email = document.getElementById("userName").value+"@gmail.com";
  let pass = document.getElementById("pass").value;
  let cap = document.getElementById("capAns2").value;

  if(parseInt(cap)!==cap2){
    alert("Wrong captcha");
    return;
  }

  auth.createUserWithEmailAndPassword(email,pass)
  .then(()=>{
    alert("Signup Success");
  })
  .catch(e=>alert(e.message));
}

/* 🔥 LOGIN */
function login(){
  let email = document.getElementById("loginUser").value+"@gmail.com";
  let pass = document.getElementById("loginPass").value;
  let cap = document.getElementById("capAns1").value;

  if(parseInt(cap)!==cap1){
    alert("Wrong captcha");
    return;
  }

  auth.signInWithEmailAndPassword(email,pass)
  .then(()=>{
    window.location.href="dashboard.html";
  })
  .catch(e=>alert(e.message));
}

/* LOAD */
window.onload = ()=>{
  generateCaptcha1();
  generateCaptcha2();
}
</script>

</body>
</html>
