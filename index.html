<div class="container">

  <!-- 🔥 TOP BANNER -->
  <div class="top-banner">
    <h1>CASINO LEVEL</h1>
    <p>Play. Win. Level Up.</p>

    <div class="level-card">
      <div>Level 2</div>
      <div class="bar"><div class="fill"></div></div>
      <div>320 / 1000 XP</div>
    </div>
  </div>

  <!-- 🎯 ACTION BOXES -->
  <div class="actions">
    <div class="box">🎁<span>Bonus</span></div>
    <div class="box">🎯<span>Missions</span></div>
    <div class="box">📈<span>Level</span></div>
    <div class="box">💰<span>Deposit</span></div>
  </div>

  <!-- 🔐 LOGIN + SIGNUP WRAPPER -->
  <div class="auth-section">

    <!-- LOGIN -->
    <div class="card">
      <h2>Log in</h2>

      <input type="text" placeholder="Username">
      <input type="password" placeholder="Password">

      <div class="captcha-box">
        <span id="cap">7 + 3</span>
        <input type="text" placeholder="Answer">
      </div>

      <button>Log in</button>
    </div>

    <!-- SIGNUP -->
    <div class="card">
      <h2>Sign up</h2>

      <input type="text" placeholder="Full Name">
      <input type="text" placeholder="Username">
      <input type="text" placeholder="Phone">
      <input type="password" placeholder="Password">

      <div class="captcha-box">
        <span id="cap2">12 - 4</span>
        <input type="text" placeholder="Answer">
      </div>

      <button>Continue</button>
    </div>

  </div>

</div>

body {
  background: black;
  color: white;
}
</style>
