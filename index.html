<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BaziBet</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
  text-align:center;
}

/* BACKGROUND HERO */
.hero{
  background:url('https://images.unsplash.com/photo-1605902711622-cfb43c44367f') no-repeat center/cover;
  padding:80px 20px;
}

/* LOGO */
.logo{
  font-size:36px;
  margin-bottom:20px;
}
.logo span{
  color:gold;
}

/* INPUT */
input{
  width:85%;
  padding:12px;
  margin:10px;
  border-radius:10px;
  border:1px solid #334155;
  background:#1e293b;
  color:white;
}

/* BUTTON */
button{
  padding:12px 20px;
  border:none;
  border-radius:10px;
  margin:10px;
  cursor:pointer;
  font-weight:bold;
}

.login-btn{
  border:2px solid #38bdf8;
  background:transparent;
  color:#38bdf8;
}

.signup-btn{
  background:linear-gradient(to right, orange, yellow);
}

/* BOX */
.box{
  display:none;
  padding:20px;
}

.active{
  display:block;
}

/* CARD STYLE */
.card{
  background:#111827;
  margin:20px;
  padding:20px;
  border-radius:15px;
  box-shadow:0 0 10px rgba(0,0,0,0.5);
}

/* FOOTER IMAGE */
.footer{
  background:url('https://images.unsplash.com/photo-1511512578047-dfb367046420') no-repeat center/cover;
  padding:60px 20px;
  margin-top:40px;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="active">

  <div class="hero">
    <div class="logo">bazi <span>|</span> bet</div>
    <button class="login-btn" onclick="showLogin()">Login</button>
    <button class="signup-btn" onclick="showSignup()">Sign Up</button>
  </div>

  <div class="footer">
    <h2>🎰 Play & Win Big</h2>
  </div>

</div>

<!-- LOGIN -->
<div id="loginBox" class="box">
  <div class="card">
    <h2>Login</h2>
    <input id="loginUser" placeholder="Username">
    <input id="loginPass" type="password" placeholder="Password">
    <br>
    <button onclick="login()">Login</button>
    <br>
    <button onclick="back()">Back</button>
  </div>
</div>

<!-- SIGNUP -->
<div id="signupBox" class="box">
  <div class="card">
    <h2>Sign Up</h2>
    <input id="name" placeholder="Full Name">
    <input id="user" placeholder="Username">
    <input id="email" placeholder="Email">
    <input id="pass" type="password" placeholder="Password">

    <p id="captchaText"></p>
    <input id="captchaInput" placeholder="Enter Answer">

    <br>
    <button onclick="signup()">Create Account</button>
    <br>
    <button onclick="back()">Back</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="box">
  <div class="card">
    <h2>🎉 Welcome to BaziBet</h2>
    <p>Now you can play games</p>
    <button onclick="logout()">Logout</button>
  </div>
</div>

<script>
// NAV
function showLogin(){
  hideAll();
  loginBox.classList.add("active");
}
function showSignup(){
  hideAll();
  signupBox.classList.add("active");
  generateCaptcha();
}
function back(){
  hideAll();
  home.classList.add("active");
}
function hideAll(){
  home.classList.remove("active");
  loginBox.classList.remove("active");
  signupBox.classList.remove("active");
  dashboard.classList.remove("active");
}

// CAPTCHA
let answer=0;
function generateCaptcha(){
  let a=Math.floor(Math.random()*10);
  let b=Math.floor(Math.random()*10);
  answer=a+b;
  captchaText.innerText=a+" + "+b+" = ?";
}

// SIGNUP
function signup(){
  let user=document.getElementById("user").value;
  let pass=document.getElementById("pass").value;
  let cap=document.getElementById("captchaInput").value;

  if(cap!=answer){
    alert("Wrong Captcha ❌");
    generateCaptcha();
    return;
  }

  localStorage.setItem(user,pass);
  alert("Account Created ✅");
  back();
}

// LOGIN
function login(){
  let user=document.getElementById("loginUser").value;
  let pass=document.getElementById("loginPass").value;

  let saved=localStorage.getItem(user);

  if(saved==pass){
    hideAll();
    dashboard.classList.add("active");
  }else{
    alert("Wrong Login ❌");
  }
}

// LOGOUT
function logout(){
  back();
}
</script>

</body>
</html>
