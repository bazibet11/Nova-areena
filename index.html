<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bazi Bet</title>

<style>
body{margin:0;background:#020c1b;color:white;font-family:sans-serif;}
.logo{text-align:center;font-size:28px;margin:20px;}
.logo span{color:gold;}

input{
  width:90%;margin:8px auto;padding:14px;
  border-radius:10px;border:none;
  background:#0c1f3d;color:white;display:block;
}

.btn{
  width:90%;margin:10px auto;padding:15px;
  border-radius:12px;font-size:18px;display:block;
}
.gold{background:gold;color:black;}
.outline{border:2px solid white;background:none;color:white;}

.hide{display:none;}

.card{
  background:#0c1f3d;margin:10px;padding:12px;
  border-radius:12px;text-align:center;
}
</style>
</head>

<body>

<div class="logo">bazi <span>bet</span></div>

<!-- SIGNUP -->
<div id="signupBox">
<input id="fullName" placeholder="Full Name">
<input id="userName" placeholder="User Name">
<input id="phone" placeholder="Phone Number">
<input id="pass" type="password" placeholder="Password">
<input id="captcha" placeholder="Enter 1234">

<button class="btn gold" onclick="signup()">Create Account</button>
<button class="btn outline" onclick="showLogin()">Login</button>
</div>

<!-- LOGIN -->
<div id="loginBox" class="hide">
<input id="loginUser" placeholder="User Name">
<input id="loginPass" type="password" placeholder="Password">

<button class="btn gold" onclick="login()">Login</button>
<button class="btn outline" onclick="showSignup()">Back</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hide">
<h3 style="text-align:center;">💰 Balance: <span id="bal">0</span></h3>

<button class="btn gold" onclick="openWallet()">💳 Wallet</button>

<h3 style="text-align:center;">🎮 Games</h3>
<div class="card">Slots</div>
<div class="card">Casino</div>
<div class="card">Live Casino</div>

<button class="btn outline" onclick="logout()">Logout</button>
</div>

<!-- WALLET -->
<div id="wallet" class="hide">
<h3 style="text-align:center;">Wallet</h3>

<input id="depositAmount" placeholder="Deposit Amount">
<button class="btn gold" onclick="deposit()">Deposit (EasyPaisa / JazzCash)</button>

<input id="withdrawAmount" placeholder="Withdraw Amount">
<button class="btn gold" onclick="withdraw()">Withdraw</button>

<button class="btn outline" onclick="back()">Back</button>
</div>

<script>

// ===== STORAGE =====
let users = JSON.parse(localStorage.getItem("users")) || [];
let currentUser = JSON.parse(localStorage.getItem("currentUser")) || null;

// ===== AUTO LOGIN =====
if(currentUser){
  showDashboard();
}

// ===== SIGNUP =====
function signup(){
  let name = fullName.value;
  let user = userName.value;
  let phoneNo = phone.value;
  let passw = pass.value;
  let cap = captcha.value;

  if(cap !== "1234"){
    alert("Captcha wrong ❌");
    return;
  }

  if(users.find(x=>x.user===user)){
    alert("Username already exists ❌");
    return;
  }

  let obj = {
    name,user,phoneNo,passw,balance:1000
  };

  users.push(obj);
  localStorage.setItem("users",JSON.stringify(users));

  alert("Account Created ✅");
  showLogin();
}

// ===== LOGIN =====
function login(){
  let u = loginUser.value;
  let p = loginPass.value;

  let found = users.find(x=>x.user===u && x.passw===p);

  if(found){
    currentUser = found;
    localStorage.setItem("currentUser",JSON.stringify(found));
    showDashboard();
  }else{
    alert("Invalid login ❌");
  }
}

// ===== DASHBOARD =====
function showDashboard(){
  signupBox.style.display="none";
  loginBox.style.display="none";
  wallet.style.display="none";
  dashboard.style.display="block";

  bal.innerText = currentUser.balance;
}

// ===== WALLET =====
function openWallet(){
  dashboard.style.display="none";
  wallet.style.display="block";
}

function back(){
  wallet.style.display="none";
  dashboard.style.display="block";
}

// ===== DEPOSIT =====
function deposit(){
  let amt = parseInt(depositAmount.value);

  if(!amt || amt<=0){
    alert("Enter valid amount ❌");
    return;
  }

  currentUser.balance += amt;
  save();
  alert("Deposit request submitted 💰");
}

// ===== WITHDRAW =====
function withdraw(){
  let amt = parseInt(withdrawAmount.value);

  if(amt > currentUser.balance){
    alert("Not enough balance ❌");
    return;
  }

  currentUser.balance -= amt;
  save();
  alert("Withdraw request sent 💸");
}

// ===== SAVE =====
function save(){
  users = users.map(u=>u.user===currentUser.user ? currentUser : u);
  localStorage.setItem("users",JSON.stringify(users));
  localStorage.setItem("currentUser",JSON.stringify(currentUser));
  showDashboard();
}

// ===== LOGOUT =====
function logout(){
  localStorage.removeItem("currentUser");
  location.reload();
}

// ===== NAV =====
function showLogin(){
  signupBox.style.display="none";
  loginBox.style.display="block";
}

function showSignup(){
  signupBox.style.display="block";
  loginBox.style.display="none";
}

</script>

</body>
</html>
