<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
body {
  margin: 0;
  font-family: Arial;
  background: #1e1e1e;
}

.container {
  background: #22b07d;
  height: 50vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

.logo {
  font-size: 40px;
  font-weight: bold;
  color: white;
  margin-bottom: 40px;
}

.btn {
  width: 220px;
  padding: 15px;
  margin: 10px;
  font-size: 18px;
  border-radius: 5px;
  border: none;
  cursor: pointer;
}

.login {
  background: transparent;
  border: 2px solid white;
  color: white;
}

.signup {
  background: linear-gradient(to right, orange, yellow);
  color: white;
}

.bottom {
  padding: 20px;
  color: white;
}
</style>
</head>

<body>

<div class="container">
  <div class="logo">bj | baji</div>

  <button class="btn login">Login</button>
  <button class="btn signup">Sign Up</button>
</div>

<div class="bottom">
  <h2>Baji999 Login</h2>
  <p>Simple demo UI like your screenshot.</p>
</div>

</body>
</html>
