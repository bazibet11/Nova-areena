<!DOCTYPE html>
<html>
<head>
  <title>Bazi Bet</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <!-- LOGIN -->
  <div class="box" id="loginBox">
    <h2>Login</h2>

    <input type="text" id="loginUser" placeholder="Username">

    <div class="password-field">
      <input type="password" id="loginPass" placeholder="Password">
      <span onclick="togglePass('loginPass')">👁️</span>
    </div>

    <div class="captcha">
      <span id="captchaQ"></span>
      <input type="text" id="captchaA" placeholder="Answer">
    </div>

    <button onclick="login()">Login</button>

    <p onclick="showSignup()">Create Account</p>
  </div>

  <!-- SIGNUP -->
  <div class="box" id="signupBox" style="display:none;">
    <h2>Signup</h2>

    <input type="text" id="signupUser" placeholder="Username">

    <div class="password-field">
      <input type="password" id="signupPass" placeholder="Password">
      <span onclick="togglePass('signupPass')">👁️</span>
    </div>

    <button onclick="signup()">Signup</button>

    <p onclick="showLogin()">Back to Login</p>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
