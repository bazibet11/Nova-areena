<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BaziBet</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#020617;
    color:white;
}

/* TOP BANNER */
.banner{
    background: url('https://images.unsplash.com/photo-1596838132731-3301c3fd4317') center/cover no-repeat;
    padding:40px 10px;
    text-align:center;
    position:relative;
}

.banner::after{
    content:'';
    position:absolute;
    top:0;left:0;right:0;bottom:0;
    background:rgba(0,0,0,0.6);
}

.banner-content{
    position:relative;
    z-index:1;
}

.logo{
    font-size:34px;
    font-weight:bold;
}

.logo span{
    color:gold;
}

.crown{
    font-size:28px;
    margin-top:5px;
}

/* BUTTONS */
.buttons{
    text-align:center;
    margin:20px 0;
}

.btn{
    width:220px;
    padding:12px;
    margin:10px;
    border-radius:10px;
    font-size:16px;
}

.login{
    background:transparent;
    border:2px solid white;
    color:white;
}

.signup{
    background:gold;
    border:none;
    color:black;
}

/* GAMES TITLE */
.games-title{
    text-align:center;
    font-size:22px;
    margin:10px 0;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
    padding:15px;
}

.card{
    background:#0b1220;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 0 12px rgba(255,215,0,0.2);
}

.card img{
    width:100%;
    height:120px;
    object-fit:cover;
}

.card p{
    text-align:center;
    padding:10px;
    margin:0;
}

/* FOOTER */
.footer{
    text-align:center;
    padding:20px;
    color:#aaa;
}
</style>

</head>
<body>

<!-- 🔥 NEW BANNER -->
<div class="banner">
    <div class="banner-content">
        <div class="logo">BAZI <span>BET</span></div>
        <div class="crown">👑</div>
    </div>
</div>

<!-- BUTTONS -->
<div class="buttons">
    <button class="btn login">Login</button><br>
    <button class="btn signup">Sign Up</button>
</div>

<!-- GAMES -->
<div class="games-title">🎮 Games</div>

<div class="grid">

    <div class="card">
        <img src="https://images.unsplash.com/photo-1596838132731-3301c3fd4317">
        <p>Slots</p>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1511193311914-0346f16efe90">
        <p>Casino</p>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1606166325683-79c5c8f93c76">
        <p>Live Casino</p>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1607082349566-187342175e2f">
        <p>Fortune Games</p>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1592503254549-d83d24a4dfab">
        <p>Chili Games</p>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1517649763962-0c623066013b">
        <p>Tournaments</p>
    </div>

</div>

<div class="footer">
© 2026 BaziBet Gaming
</div>

</body>
</html>
