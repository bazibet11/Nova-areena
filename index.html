<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bazi Bet</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>🎰 Bazi Bet</h1>

<!-- LOGIN -->
<div id="loginBox">
  <h2>Login</h2>

  <input id="loginUser" placeholder="Username">

  <div class="field">
    <input type="password" id="loginPass" placeholder="Password">
    <span class="eye" onclick="togglePass('loginPass')">👁</span>
  </div>

  <p id="captchaQ1"></p>
  <input id="captchaA1" placeholder="Answer">

  <button onclick="login()">Log in</button>

  <p class="link" onclick="forgot()">Forgot Password?</p>

  <p>Don't have account? 
    <span class="link" onclick="showSignup()">Sign up</span>
  </p>
</div>

<!-- SIGNUP -->
<div id="signupBox" style="display:none;">
  <h2>Sign Up</h2>

  <input id="realName" placeholder="Full Name">
  <input id="userName" placeholder="Username">
  <input id="phone" placeholder="Phone Number">

  <div class="field">
    <input type="password" id="signPass" placeholder="Password">
    <span class="eye" onclick="togglePass('signPass')">👁</span>
  </div>

  <p id="captchaQ2"></p>
  <input id="captchaA2" placeholder="Answer">

  <button onclick="signup()">Create Account</button>

  <p>Already have account? 
    <span class="link" onclick="showLogin()">Login</span>
  </p>
</div>

</div>

<script src="app.js"></script>

</body>
</html>
