<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BaziBet</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(to bottom, #0a0f2c, #000);
  color: white;
}

/* TOP BANNER */
.top-banner {
  width: 100%;
  height: 180px;
  background: url('https://i.imgur.com/8Km9tLL.jpg') center/cover;
  border-bottom: 3px solid gold;
}

/* CENTER BOX */
.container {
  text-align: center;
  padding: 20px;
}

.logo {
  font-size: 28px;
  margin: 15px 0;
}

.logo span {
  color: gold;
}

/* BUTTONS */
.btn {
  width: 200px;
  padding: 12px;
  margin: 10px;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
}

.login-btn {
  border: 2px solid white;
  background: transparent;
  color: white;
}

.signup-btn {
  background: linear-gradient(to right, orange, gold);
  border: none;
  color: black;
}

/* FORM */
.form-box {
  display: none;
  margin-top: 20px;
}

input {
  width: 80%;
  padding: 12px;
  margin: 8px;
  border-radius: 6px;
  border: none;
}

.submit-btn {
  background: green;
  color: white;
  border: none;
  padding: 12px;
  width: 60%;
  border-radius: 6px;
}

/* GAMES SECTION */
.games {
  margin-top: 30px;
}

.game-title {
  font-size: 20px;
  margin-bottom: 10px;
}

.game-grid {
  display: flex;
  overflow-x: auto;
}

.game {
  min-width: 120px;
  margin: 5px;
  background: #111;
  border-radius: 10px;
  padding: 10px;
}

.game img {
  width: 100%;
  border-radius: 8px;
}

</style>
</head>

<body>

<!-- TOP IMAGE -->
<div class="top-banner"></div>

<div class="container">

  <div class="logo">bazi <span>bet</span></div>

  <button class="btn login-btn" onclick="showLogin()">Login</button>
  <button class="btn signup-btn" onclick="showSignup()">Sign Up</button>

  <!-- LOGIN -->
  <div class="form-box" id="loginBox">
    <h2>Login</h2>
    <input type="text" placeholder="Username">
    <input type="password" placeholder="Password">
    <br>
    <button class="submit-btn">Login</button>
  </div>

  <!-- SIGNUP -->
  <div class="form-box" id="signupBox">
    <h2>Sign Up</h2>
    <input type="text" placeholder="Full Name">
    <input type="text" placeholder="Username">
    <input type="email" placeholder="Email">
    <input type="password" placeholder="Password">

    <div id="captcha"></div>
    <input type="text" placeholder="Enter Answer">

    <br>
    <button class="submit-btn">Create Account</button>
  </div>

  <!-- GAMES -->
  <div class="games">
    <div class="game-title">🎮 Games</div>

    <div class="game-grid">
      <div class="game">
        <img src="https://i.imgur.com/3ZQ3Z6B.jpg">
        Slots
      </div>

      <div class="game">
        <img src="https://i.imgur.com/FxZlV7F.jpg">
        Casino
      </div>

      <div class="game">
        <img src="https://i.imgur.com/9XqQZ6n.jpg">
        Live Casino
      </div>

      <div class="game">
        <img src="https://i.imgur.com/yYQZ6pN.jpg">
        Jackpot
      </div>
    </div>
  </div>

</div>

<script>
function showLogin(){
  document.getElementById("loginBox").style.display = "block";
  document.getElementById("signupBox").style.display = "none";
}

function showSignup(){
  document.getElementById("signupBox").style.display = "block";
  document.getElementById("loginBox").style.display = "none";
  generateCaptcha();
}

/* CAPTCHA */
function generateCaptcha(){
  let a = Math.floor(Math.random()*10);
  let b = Math.floor(Math.random()*10);
  document.getElementById("captcha").innerHTML = a + " + " + b + " = ?";
}
</script>

</body>
</html>
