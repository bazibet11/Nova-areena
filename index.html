<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bazi Bet</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #020b1c;
  color: white;
}

/* TOP */
.banner {
  height: 200px;
  background: url('https://images.unsplash.com/photo-1596838132731-3301c3fd4317') center/cover;
}

/* TITLE */
.title {
  text-align: center;
  font-size: 26px;
  margin: 10px;
}
.title span { color: gold; }

/* BUTTONS */
.btn {
  display: block;
  width: 85%;
  margin: 10px auto;
  padding: 14px;
  border-radius: 12px;
  font-size: 18px;
}

.login {
  border: 2px solid white;
  background: transparent;
  color: white;
}

.signup {
  background: linear-gradient(to right, #ffcc00, #ffaa00);
  color: black;
  border: none;
}

/* FORM */
.form-box {
  display: none;
  padding: 20px;
}

.input-box {
  position: relative;
  margin-bottom: 15px;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  outline: none;
}

/* EYE ICON */
.eye {
  position: absolute;
  right: 10px;
  top: 12px;
  cursor: pointer;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  padding: 15px;
}

.card {
  background: #0b132b;
  border-radius: 12px;
  overflow: hidden;
  text-align: center;
}

.card img {
  width: 100%;
  height: 90px;
  object-fit: cover;
}

</style>
</head>

<body>

<div class="banner"></div>

<div class="title">bazi <span>bet</span></div>

<button class="btn login" onclick="showLogin()">Login</button>
<button class="btn signup" onclick="showSignup()">Sign Up</button>

<!-- LOGIN -->
<div class="form-box" id="loginForm">
  <h3>Login</h3>

  <div class="input-box">
    <input type="text" placeholder="Username">
  </div>

  <div class="input-box">
    <input type="password" id="loginPass" placeholder="Password">
    <span class="eye" onclick="togglePass('loginPass')">👁️</span>
  </div>

  <button class="btn signup">Login Now</button>
</div>

<!-- SIGNUP -->
<div class="form-box" id="signupForm">
  <h3>Sign Up</h3>

  <div class="input-box">
    <input type="text" placeholder="Username">
  </div>

  <div class="input-box">
    <input type="password" id="signupPass" placeholder="Password">
    <span class="eye" onclick="togglePass('signupPass')">👁️</span>
  </div>

  <button class="btn signup">Create Account</button>
</div>

<!-- GAMES -->
<div class="grid">

  <div class="card">
    <img src="https://images.unsplash.com/photo-1511512578047-dfb367046420">
    <p>Slots</p>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1601379327928-bedfaf9da2d0">
    <p>Casino</p>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1607082349566-187342175e2f">
    <p>Live Casino</p>
  </div>

</div>

<script>
function showLogin(){
  document.getElementById("loginForm").style.display = "block";
  document.getElementById("signupForm").style.display = "none";
}

function showSignup(){
  document.getElementById("signupForm").style.display = "block";
  document.getElementById("loginForm").style.display = "none";
}

function togglePass(id){
  let x = document.getElementById(id);
  x.type = x.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
