<!DOCTYPE html>
<html>
<head>
  <title>Nova Areena</title>
</head>

<body>

<h2>Login / Signup</h2>

<input type="email" id="email" placeholder="Enter Email"><br><br>
<input type="password" id="password" placeholder="Enter Password"><br><br>

<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>

</body>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDHpc9lN_y8c2TaOXfed5ayOzEjYbN5ur4",
  authDomain: "nova-areena.firebaseapp.com",
  projectId: "nova-areena",
  storageBucket: "nova-areena.firebasestorage.app",
  messagingSenderId: "888991377297",
  appId: "1:888991377297:web:9f049d040121c538385c30"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.signup = function () {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  createUserWithEmailAndPassword(auth, email, password)
    .then(() => alert("Signup Successful ✅"))
    .catch((error) => alert(error.message));
};

window.login = function () {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
    .then(() => alert("Login Successful ✅"))
    .catch((error) => alert(error.message));
};
</script>

</html>
