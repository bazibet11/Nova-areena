<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bazi Bet</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #020d1f;
  color: white;
}

.header img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

.logo {
  text-align: center;
  font-size: 28px;
  margin: 10px;
}
.logo span {
  color: gold;
}

.btn {
  display: block;
  width: 80%;
  margin: 10px auto;
  padding: 12px;
  border-radius: 10px;
  font-size: 18px;
  border: none;
}

.login {
  background: transparent;
  border: 2px solid white;
  color: white;
}

.signup {
  background: gold;
  color: black;
}

.form {
  width: 85%;
  margin: auto;
  display: none;
}

.form input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 10px;
  border: none;
  background: #0b1d3a;
  color: white;
}

.password-box {
  position: relative;
}
.password-box span {
  position: absolute;
  right: 10px;
  top: 12px;
  cursor: pointer;
}

.games {
  padding: 10px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.card {
  background: #081a35;
  border-radius: 12px;
  text-align: center;
  padding: 5px;
  box-shadow: 0 0 10px rgba(255,215,0,0.3);
}

.card img {
  width: 100%;
  height: 90px;
  object-fit: cover;
  border-radius: 10px;
}

.card p {
  margin: 5px;
}

</style>
</head>

<body>

<div class="header">
  <img src="https://images.unsplash.com/photo-1596838132731-3301c3fd4317">
</div>

<div class="logo">bazi <span>bet</span></div>

<button class="btn login" onclick="showLogin()">Login</button>
<button class="btn signup" onclick="showSignup()">Sign Up</button>

<!-- LOGIN -->
<div class="form" id="loginForm">
  <input type="text" id="loginUser" placeholder="Username">
  
  <div class="password-box">
    <input type="password" id="loginPass" placeholder="Password">
    <span onclick="togglePass('loginPass')">👁️</span>
  </div>

  <button class="btn signup" onclick="login()">Login</button>
</div>

<!-- SIGNUP -->
<div class="form" id="signupForm">
  <input type="text" id="user" placeholder="Username">
  <input type="text" id="name" placeholder="Full Name">
  <input type="text" id="phone" placeholder="Phone Number">

  <div class="password-box">
    <input type="password" id="pass" placeholder="Password">
    <span onclick="togglePass('pass')">👁️</span>
  </div>

  <button class="btn signup" onclick="signup()">Create Account</button>
</div>

<!-- GAMES -->
<div class="games">
  <h3>🎮 Games</h3>

  <div class="grid">
    <div class="card">
      <img src="https://images.unsplash.com/photo-1608889175123-8ee362201f81">
      <p>Slots</p>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1606167668584-78701c57f13d">
      <p>Casino</p>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1596838132731-3301c3fd4317">
      <p>Live Casino</p>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1511512578047-dfb367046420">
      <p>Fortune Games</p>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092">
      <p>Jilli Games</p>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1508098682722-e99c43a406b2">
      <p>Sports</p>
    </div>
  </div>
</div>

<script>

function showLogin(){
  document.getElementById("loginForm").style.display="block";
  document.getElementById("signupForm").style.display="none";
}

function showSignup(){
  document.getElementById("signupForm").style.display="block";
  document.getElementById("loginForm").style.display="none";
}

function togglePass(id){
  let input = document.getElementById(id);
  input.type = input.type === "password" ? "text" : "password";
}

// SAVE DATA
function signup(){
  let user = document.getElementById("user").value;
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let pass = document.getElementById("pass").value;

  localStorage.setItem("user", user);
  localStorage.setItem("name", name);
  localStorage.setItem("phone", phone);
  localStorage.setItem("pass", pass);

  alert("Account Created ✅");
}

// LOGIN
function login(){
  let u = document.getElementById("loginUser").value;
  let p = document.getElementById("loginPass").value;

  let savedUser = localStorage.getItem("user");
  let savedPass = localStorage.getItem("pass");

  if(u === savedUser && p === savedPass){
    alert("Login Successful 🎉");
  } else {
    alert("Wrong Details ❌");
  }
}

// AUTO LOGIN
window.onload = function(){
  let user = localStorage.getItem("user");
  if(user){
    console.log("Auto login:", user);
  }
}

</script>

</body>
</html>
