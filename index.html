<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BaziBet Login</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

// 🔥 APNI CONFIG DAALO
const firebaseConfig = {
  apiKey: "YAHAN_API_KEY",
  authDomain: "nova-areena.firebaseapp.com",
  projectId: "nova-areena",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// SIGNUP
window.signup = async function () {
  let email = document.getElementById("email").value;
  let pass = document.getElementById("password").value;

  try {
    await createUserWithEmailAndPassword(auth, email, pass);
    alert("Account Created ✅");
  } catch (e) {
    alert(e.message);
  }
};

// LOGIN
window.login = async function () {
  let email = document.getElementById("lemail").value;
  let pass = document.getElementById("lpassword").value;

  try {
    await signInWithEmailAndPassword(auth, email, pass);
  } catch (e) {
    alert(e.message);
  }
};

// AUTO LOGIN
onAuthStateChanged(auth, (user) => {
  if(user){
    home.style.display="none";
    loginBox.style.display="none";
    signupBox.style.display="none";
    dashboard.style.display="block";
  }
});

// LOGOUT
window.logout = function(){
  signOut(auth);
  location.reload();
};
</script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  text-align:center;
}

.container{
  padding:40px;
}

.logo{
  font-size:35px;
  margin-bottom:20px;
}

.logo span{
  color:gold;
}

input{
  padding:12px;
  margin:10px;
  width:80%;
  border-radius:6px;
  border:none;
}

button{
  padding:12px 20px;
  margin:10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.login-btn{
  border:2px solid #38bdf8;
  background:transparent;
  color:#38bdf8;
}

.signup-btn{
  background:linear-gradient(to right, orange, yellow);
}
</style>
</head>

<body>

<div id="home" class="container">
  <div class="logo">bazi <span>|</span> bet</div>
  <button class="login-btn" onclick="showLogin()">Login</button>
  <button class="signup-btn" onclick="showSignup()">Sign Up</button>
</div>

<!-- LOGIN -->
<div id="loginBox" style="display:none;">
  <h2>Login</h2>
  <input id="lemail" placeholder="Email"><br>
  <input id="lpassword" type="password" placeholder="Password"><br>
  <button onclick="login()">Login</button>
  <br><button onclick="back()">Back</button>
</div>

<!-- SIGNUP -->
<div id="signupBox" style="display:none;">
  <h2>Sign Up</h2>
  <input id="email" placeholder="Email"><br>
  <input id="password" type="password"><br>
  <button onclick="signup()">Create Account</button>
  <br><button onclick="back()">Back</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" style="display:none;">
  <h2>✅ Login Successful</h2>
  <p>Welcome to BaziBet</p>
  <button onclick="logout()">Logout</button>
</div>

<div style="padding:20px;">
  <h3>BaziBet Login</h3>
</div>

<script>
function showLogin(){
  home.style.display="none";
  loginBox.style.display="block";
}
function showSignup(){
  home.style.display="none";
  signupBox.style.display="block";
}
function back(){
  home.style.display="block";
  loginBox.style.display="none";
  signupBox.style.display="none";
}
</script>

</body>
</html>
