<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bazi Bet</title>

<style>
body{margin:0;background:#020c1b;color:white;font-family:sans-serif;}
.center{text-align:center;margin-top:20px;}
.btn{width:90%;margin:10px auto;padding:15px;border-radius:12px;font-size:18px;display:block;}
.login{border:2px solid white;background:none;color:white;}
.signup{background:gold;color:black;}
input{width:90%;padding:15px;margin:10px auto;border-radius:10px;border:none;background:#0c1f3d;color:white;display:block;}
.hide{display:none;}

.card{background:#0c1f3d;border-radius:12px;margin:10px;padding:10px;text-align:center;}
</style>
</head>

<body>

<!-- AUTH -->
<div id="auth">
<h2 class="center">bazi <span style="color:gold">bet</span></h2>

<input id="phone" placeholder="Phone Number">
<input id="pass" type="password" placeholder="Password">

<button class="btn signup" onclick="signup()">Create Account</button>
<button class="btn login" onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hide">
<h3 class="center">💰 Balance: <span id="bal">0</span></h3>

<button class="btn signup" onclick="playGame()">🎮 Play Game</button>
<button class="btn login" onclick="openWallet()">💳 Wallet</button>
</div>

<!-- WALLET -->
<div id="wallet" class="hide">
<h3 class="center">Wallet</h3>

<input id="withdrawPhone" placeholder="Withdraw Phone">
<input id="amount" placeholder="Amount">

<button class="btn signup" onclick="withdraw()">Withdraw</button>
<button class="btn login" onclick="back()">Back</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import { getFirestore, doc, setDoc, getDoc, updateDoc } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔥 apna config yahan dalo
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let uid=null;

// SIGNUP
window.signup = async ()=>{
  let phone = document.getElementById("phone").value;
  let pass = document.getElementById("pass").value;

  let email = phone + "@bazi.com";

  let user = await createUserWithEmailAndPassword(auth,email,pass);

  await setDoc(doc(db,"users",user.user.uid),{
    balance:1000,
    phone:phone
  });

  uid=user.user.uid;
  showDashboard();
};

// LOGIN
window.login = async ()=>{
  let phone = document.getElementById("phone").value;
  let pass = document.getElementById("pass").value;

  let email = phone + "@bazi.com";

  let user = await signInWithEmailAndPassword(auth,email,pass);

  uid=user.user.uid;
  showDashboard();
};

// DASHBOARD
async function showDashboard(){
  document.getElementById("auth").style.display="none";
  document.getElementById("dashboard").style.display="block";

  let snap = await getDoc(doc(db,"users",uid));
  document.getElementById("bal").innerText = snap.data().balance;
}

// GAME
window.playGame = async ()=>{
  let ref = doc(db,"users",uid);
  let snap = await getDoc(ref);

  let bal = snap.data().balance;
  let win = Math.random()>0.5 ? 100 : -50;

  await updateDoc(ref,{balance:bal+win});

  alert(win>0?"Win 💰":"Lose ❌");

  showDashboard();
};

// WALLET
window.openWallet=()=>{
  document.getElementById("dashboard").style.display="none";
  document.getElementById("wallet").style.display="block";
};

window.back=()=>{
  document.getElementById("wallet").style.display="none";
  document.getElementById("dashboard").style.display="block";
};

// WITHDRAW
window.withdraw = async ()=>{
  let phone = document.getElementById("withdrawPhone").value;
  let amount = parseInt(document.getElementById("amount").value);

  let ref = doc(db,"users",uid);
  let snap = await getDoc(ref);

  let bal = snap.data().balance;

  if(amount>bal){
    alert("Not enough balance ❌");
    return;
  }

  await updateDoc(ref,{balance:bal-amount});

  alert("Withdraw request sent to "+phone);

  back();
};

</script>

</body>
</html>
