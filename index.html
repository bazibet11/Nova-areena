<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bazi Bet</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <!-- HERO -->
  <div class="hero">
    <h2>Hello</h2>
    <h1>Welcome to Bazi Bet</h1>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <div class="tab active" onclick="showLogin(this)">Log in</div>
    <div class="tab" onclick="showSignup(this)">Sign up</div>
  </div>

  <!-- LOGIN -->
  <div id="loginForm">
    <input type="text" placeholder="Enter your username">

    <div class="password-box">
      <input type="password" id="loginPass" placeholder="Enter your password">
      <span onclick="togglePassword('loginPass')">👁️</span>
    </div>

    <a href="#" class="forgot">Forgot password?</a>

    <button>Log in</button>
  </div>

  <!-- SIGNUP -->
  <div id="signupForm" style="display:none;">

    <input type="text" placeholder="Full Name">
    <input type="text" placeholder="Username">
    
    <input type="text" placeholder="Phone Number (+92...)">

    <div class="password-box">
      <input type="password" id="signupPass" placeholder="Password">
      <span onclick="togglePassword('signupPass')">👁️</span>
    </div>

    <select>
      <option>PKR</option>
    </select>

    <div class="checkbox">
      <input type="checkbox">
      <label>I am 18+ and agree terms</label>
    </div>

    <button>Continue</button>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>

window.generateCaptcha = function(id) {
  a = Math.floor(Math.random() * 10);
  b = Math.floor(Math.random() * 10);
  window.captchaAnswer = a + b;
  document.getElementById(id).innerText = a + " + " + b + " =";
}

// SIGNUP
window.signup = function () {
  let email = document.getElementById("userName").value + "@gmail.com";
  let pass = document.getElementById("pass").value;
  let cap = document.getElementById("capAns2").value;

  if (parseInt(cap) !== window.captchaAnswer) {
    alert("Wrong captcha!");
    return;
  }

  createUserWithEmailAndPassword(auth, email, pass)
    .then(() => {
      alert("Signup Success ✅");
    })
    .catch(err => alert(err.message));
}

// LOGIN
window.login = function () {
  let email = document.getElementById("loginUser").value + "@gmail.com";
  let pass = document.getElementById("loginPass").value;
  let cap = document.getElementById("capAns1").value;

  if (parseInt(cap) !== window.captchaAnswer) {

    return;
  }

  signInWithEmailAndPassword(auth, email, pass)
    .then(() => {
      alert("Login Success 🎉");

    })
    .catch(err => alert(err.message));
}

// LOAD
window.onload = function() {
  generateCaptcha("cap1");
};
</script>
