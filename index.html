<!DOCTYPE html>
<html>
<head>
  <title>Bazi Bet</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Bazi Bet 🎰</h1>

<div class="buttons">
  <button onclick="showLogin()">Login</button>
  <button onclick="showSignup()">Signup</button>
</div>

<!-- LOGIN -->
<div id="loginBox" class="box">
  <h2>Login</h2>

  <input type="text" id="loginUser" placeholder="Username"><br>

  <div class="passBox">
    <input type="password" id="loginPass" placeholder="Password">
    <span onclick="togglePass('loginPass')">👁</span>
  </div>

  <p id="loginCaptcha"></p>
  <input type="text" id="loginCapInput" placeholder="Answer"><br>

  <button onclick="login()">Login</button>

  <p onclick="forgotPass()">Forgot Password?</p>
</div>

<!-- SIGNUP -->
<div id="signupBox" class="box" style="display:none;">
  <h2>Signup</h2>

  <input type="text" id="fullName" placeholder="Full Name"><br>
  <input type="text" id="userName" placeholder="Username"><br>
  <input type="text" id="phone" placeholder="Phone No"><br>

  <div class="passBox">
    <input type="password" id="signPass" placeholder="Password">
    <span onclick="togglePass('signPass')">👁</span>
  </div>

  <p id="signCaptcha"></p>
  <input type="text" id="signCapInput" placeholder="Answer"><br>

  <button onclick="signup()">Register</button>
</div>

<script src="app.js"></script>

</body>
</html>
