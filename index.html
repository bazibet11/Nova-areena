<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BaziBet</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#020b1f;
  color:white;
  text-align:center;
}

/* TOP BANNER */
.banner{
  background:url('https://images.unsplash.com/photo-1596838132731-3301c3fd4317?q=80&w=1200') center/cover;
  padding:50px 20px;
}
.banner h1{
  font-size:38px;
}
.banner span{color:#f7c200;}
.crown{font-size:28px;}

/* BUTTONS */
.btn{
  width:80%;
  padding:14px;
  margin:10px auto;
  border-radius:10px;
  font-size:18px;
  display:block;
}
.login{
  border:2px solid white;
  background:none;
  color:white;
}
.signup{
  background:#f7c200;
  border:none;
  color:black;
}

/* FORMS */
.form{
  display:none;
  padding:20px;
}
input{
  width:80%;
  padding:12px;
  margin:8px;
  border-radius:8px;
  border:none;
}

/* JACKPOT */
.jackpot{
  color:#f7c200;
  font-size:22px;
  margin:20px 0;
  text-shadow:0 0 10px gold;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  padding:15px;
}
.card{
  background:#08142b;
  border-radius:15px;
  overflow:hidden;
}
.card img{
  width:100%;
  height:120px;
  object-fit:cover;
}
.card p{
  padding:10px;
}
</style>
</head>

<body>

<!-- TOP -->
<div class="banner">
  <h1>BAZI <span>BET</span></h1>
  <div class="crown">👑</div>
</div>

<!-- BUTTONS -->
<button class="btn login" onclick="showLogin()">Login</button>
<button class="btn signup" onclick="showSignup()">Sign Up</button>

<!-- LOGIN FORM -->
<div id="loginForm" class="form">
  <h2>Login</h2>
  <input type="text" id="loginUser" placeholder="Username">
  <input type="password" id="loginPass" placeholder="Password">
  <button class="btn signup" onclick="login()">Login</button>
</div>

<!-- SIGNUP FORM -->
<div id="signupForm" class="form">
  <h2>Sign Up</h2>
  <input type="text" id="name" placeholder="Full Name">
  <input type="text" id="user" placeholder="Username">
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="pass" placeholder="Password">

  <p id="captchaText"></p>
  <input type="text" id="captchaInput" placeholder="Enter captcha">

  <button class="btn signup" onclick="signup()">Create Account</button>
</div>

<!-- JACKPOT -->
<div class="jackpot">💰 GRAND JACKPOT: 1000$ 💰</div>

<!-- GAMES -->
<div class="grid">

  <div class="card">
    <img src="https://images.unsplash.com/photo-1596838132731-3301c3fd4317">
    <p>Slots</p>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1511512578047-dfb367046420">
    <p>Casino</p>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1596495578065-6e0763fa1178">
    <p>Live Casino</p>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1606167668584-78701c57f13d">
    <p>Fortune Games</p>
  </div>

  <!-- 🔥 JILLI GAMES (casino girl added) -->
  <div class="card">
    <img src="https://images.unsplash.com/photo-1621961458348-f013d219b50c">
    <p>Jilli Games</p>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1542751371-adc38448a05e">
    <p>Tournaments</p>
  </div>

</div>

<script>
let captcha="";

function generateCaptcha(){
  let a=Math.floor(Math.random()*10);
  let b=Math.floor(Math.random()*10);
  captcha=a+b;
  document.getElementById("captchaText").innerText=a+" + "+b+" = ?";
}

generateCaptcha();

function showLogin(){
  document.getElementById("loginForm").style.display="block";
  document.getElementById("signupForm").style.display="none";
}

function showSignup(){
  document.getElementById("signupForm").style.display="block";
  document.getElementById("loginForm").style.display="none";
}

function signup(){
  let user=document.getElementById("user").value;
  let pass=document.getElementById("pass").value;
  let cap=document.getElementById("captchaInput").value;

  if(cap!=captcha){
    alert("Wrong Captcha!");
    return;
  }

  localStorage.setItem("user",user);
  localStorage.setItem("pass",pass);

  alert("Account Created!");
}

function login(){
  let u=document.getElementById("loginUser").value;
  let p=document.getElementById("loginPass").value;

  let su=localStorage.getItem("user");
  let sp=localStorage.getItem("pass");

  if(u==su && p==sp){
    alert("Login Successful!");
  }else{
    alert("Wrong Username or Password");
  }
}
</script>

</body>
</html>
