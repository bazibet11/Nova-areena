<!DOCTYPE html>
<html>
<head>
  <title>Nova Areena</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0f172a, #020617);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      width: 90%;
      max-width: 420px;
      padding: 30px;
      background: #0b1220;
      border-radius: 20px;
      box-shadow: 0 0 25px rgba(0,0,0,0.6);
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 14px;
      margin: 10px 0;
      border-radius: 10px;
      border: none;
      outline: none;
      background: #020617;
      color: white;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      margin-top: 10px;
      font-size: 16px;
      cursor: pointer;
    }

    .btn-blue {
      background: #2563eb;
      color: white;
    }

    .btn-green {
      background: #22c55e;
      color: white;
    }

    .switch {
      margin-top: 15px;
      cursor: pointer;
      color: #38bdf8;
    }
  </style>
</head>

<body>

<div class="box">

  <!-- SIGNUP -->
  <div id="signupBox">
    <h2>Sign Up</h2>

    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button class="btn-blue" onclick="signup()">Create Account</button>

    <p class="switch" onclick="showLogin()">Already have account? Login</p>
  </div>

  <!-- LOGIN -->
  <div id="loginBox" style="display:none;">
    <h2>Login</h2>

    <input id="loginEmail" type="email" placeholder="Email">
    <input id="loginPassword" type="password" placeholder="Password">

    <button class="btn-green" onclick="login()">Login</button>

    <p class="switch" onclick="showSignup()">Create new account</p>
  </div>

</div>

<script>
  const firebaseConfig = {
    apiKey: "PASTE_YOUR_API_KEY",
    authDomain: "nova-areena.firebaseapp.com",
    projectId: "nova-areena"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();

  function signup() {
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    auth.createUserWithEmailAndPassword(email, password)
      .then(() => {
        alert("Signup Success ✅");
      })
      .catch(err => alert(err.message));
  }

  function login() {
    let email = document.getElementById("loginEmail").value;
    let password = document.getElementById("loginPassword").value;

    auth.signInWithEmailAndPassword(email, password)
      .then(() => {
        alert("Login Success 🎉");
      })
      .catch(err => alert(err.message));
  }

  function showLogin() {
    document.getElementById("signupBox").style.display = "none";
    document.getElementById("loginBox").style.display = "block";
  }

  function showSignup() {
    document.getElementById("signupBox").style.display = "block";
    document.getElementById("loginBox").style.display = "none";
  }
</script>

</body>
</html>
